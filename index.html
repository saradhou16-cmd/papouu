<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Défi pour l'Ingénieur</title>
    <style>
        :root {
            --bg-color: #f0f4f8;
            --tech-blue: #2c3e50;
            --accent-orange: #f39c12;
            --chalk-white: #ecf0f1;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-color);
            background-image: 
                linear-gradient(rgba(44, 62, 80, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(44, 62, 80, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
            overflow: hidden;
        }

        /* --- Zone 1 : Le Calcul (Tableau Noir) --- */
        #calculation-zone {
            text-align: center;
            background: #222;
            padding: 40px;
            border-radius: 15px;
            border: 8px solid #34495e;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: all 0.5s ease;
            z-index: 10;
        }

        #calculation-zone h2 {
            color: var(--accent-orange);
            font-size: 1.2rem;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        #equation {
            font-family: 'Courier New', monospace;
            font-size: 3.5rem;
            color: var(--chalk-white);
            margin-bottom: 30px;
        }

        #answer-input {
            font-size: 2rem;
            padding: 10px;
            width: 100px;
            text-align: center;
            border-radius: 8px;
            border: none;
        }

        #submit-btn {
            font-size: 1.2rem;
            padding: 12px 25px;
            margin-left: 10px;
            background-color: var(--accent-orange);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            vertical-align: top;
        }

        #error-msg {
            color: #e74c3c;
            margin-top: 20px;
            font-weight: bold;
            min-height: 1.5rem;
        }

        /* --- Zone 2 : Le Cadeau --- */
        #gift-zone {
            display: none;
            text-align: center;
            z-index: 20;
        }

        #gift-box {
            font-size: 8rem;
            cursor: pointer;
            animation: bounce 1s infinite alternate;
            transition: all 0.5s;
        }

        @keyframes bounce {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        /* --- Zone 3 : La Lettre et le Dessin --- */
        #letter {
            display: none;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            width: 380px;
            text-align: center;
            border: 1px solid #ddd;
            animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        #letter-text {
            font-family: 'Comic Sans MS', cursive;
            font-size: 2.5rem;
            color: #2980b9;
            margin-bottom: 10px;
        }

        /* --- Confettis --- */
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #f00;
            z-index: 100;
            animation: fall 3s linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }

    </style>
</head>
<body>

    <div id="calculation-zone">
        <h2>Vérification Ingénieur requis :</h2>
        <div id="equation">14 + 11 = ?</div>
        <input type="number" id="answer-input" placeholder="0">
        <button id="submit-btn">OK</button>
        <div id="error-msg"></div>
    </div>

    <div id="gift-zone">
        <div id="gift-box">🎁</div>
        <p style="color: #2c3e50; font-weight: bold; margin-top: 20px;">Félicitations ! Clique pour ouvrir.</p>
    </div>

    <div id="letter">
        <div id="letter-text">Best Dad Ever</div>
        
        <svg viewBox="0 0 400 220" style="width: 100%; height: auto;">
            <g stroke="#34495e" stroke-width="4" fill="none" stroke-linecap="round">
                
                <text x="75" y="30" font-family="cursive" font-size="22" fill="#2c3e50" stroke="none" font-weight="bold">Papa</text>
                <circle cx="100" cy="70" r="25"/> 
                <line x1="100" y1="95" x2="100" y2="150"/> 
                <line x1="100" y1="115" x2="70" y2="145"/> 
                <line x1="100" y1="115" x2="130" y2="145"/> 
                <line x1="100" y1="150" x2="80" y2="190"/> 
                <line x1="100" y1="150" x2="120" y2="190"/> 
                <line x1="130" y1="145" x2="145" y2="130" stroke="#f39c12" stroke-width="3"/>

                <text x="160" y="55" font-family="cursive" font-size="18" fill="#34495e" stroke="none">Sara</text>
                <circle cx="180" cy="90" r="18"/>
                <line x1="180" y1="108" x2="180" y2="150"/>
                <line x1="180" y1="120" x2="160" y2="140"/>
                <line x1="180" y1="120" x2="200" y2="140"/>
                <line x1="180" y1="150" x2="165" y2="190"/>
                <line x1="180" y1="150" x2="195" y2="190"/>

                <text x="215" y="80" font-family="cursive" font-size="16" fill="#34495e" stroke="none">Nisrrine</text>
                <circle cx="250" cy="110" r="15"/>
                <line x1="250" y1="125" x2="250" y2="160"/>
                <line x1="250" y1="135" x2="235" y2="150"/>
                <line x1="250" y1="135" x2="265" y2="150"/>
                <line x1="250" y1="160" x2="240" y2="190"/>
                <line x1="250" y1="160" x2="260" y2="190"/>

                <text x="305" y="40" font-family="cursive" font-size="20" fill="#e056fd" stroke="none">Maman</text>
                <circle cx="330" cy="75" r="22"/>
                <path d="M 330 97 L 300 150 L 360 150 Z" />
                <line x1="330" y1="115" x2="305" y2="135"/>
                <line x1="330" y1="115" x2="355" y2="135"/>
                <line x1="315" y1="150" x2="310" y2="190"/>
                <line x1="345" y1="150" x2="350" y2="190"/>
            </g>
        </svg>
    </div>

    <script>
        const calcZone = document.getElementById('calculation-zone');
        const giftZone = document.getElementById('gift-zone');
        const letter = document.getElementById('letter');
        const input = document.getElementById('answer-input');
        const submitBtn = document.getElementById('submit-btn');
        const error = document.getElementById('error-msg');

        function createConfetti() {
            for (let i = 0; i < 50; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.style.left = Math.random() * 100 + 'vw';
                c.style.backgroundColor = `hsl(${Math.random() * 360}, 70%, 60%)`;
                c.style.animationDelay = Math.random() * 2 + 's';
                document.body.appendChild(c);
            }
        }

        submitBtn.onclick = () => {
            if (parseInt(input.value) === 25) {
                createConfetti();
                calcZone.style.display = 'none';
                giftZone.style.display = 'block';
            } else {
                error.textContent = "Erreur de calcul ! Un ingénieur peut faire mieux 😉";
                input.value = "";
            }
        };

        document.getElementById('gift-box').onclick = () => {
            giftZone.style.display = 'none';
            letter.style.display = 'block';
        };
    </script>
</body>
</html>
